---
- name: Set variables
  include_tasks: variables.yaml

# Check if the desired server packages are already available from
# existing repositories (PGDG, AppStream, Foreman, etc.).  Only add
# the PGDG repository if the packages cannot be found otherwise.
- name: Check if PostgreSQL server packages are available
  ansible.builtin.shell:
    cmd: "{{ ansible_pkg_mgr }} list available {{ postgresql_packages | join(' ') }} 2>/dev/null || rpm -q {{ postgresql_packages | join(' ') }} 2>/dev/null"
  register: _pg_packages_available
  changed_when: false
  failed_when: false
  become: true

- name: PostgreSQL repository
  when: _pg_packages_available.rc != 0
  include_tasks: repository.yaml

- name: PostgreSQL server and adapter packages
  become: true
  ansible.builtin.package:
    name: "{{ postgresql_packages }}"

- name: Get postgres user info
  ansible.builtin.getent:
    database: passwd
    key: postgres

- name: Extract postgres user home directory
  ansible.builtin.set_fact:
    postgres_home: "{{ getent_passwd.postgres[4] }}"

- name: Determine the PostgreSQL data directory location
  ansible.builtin.set_fact:
    postgresql_pgdata: "{{ postgres_home }}/{{ postgresql_major_version }}/data"

- name: Check the PostgreSQL data directory structure
  become: true
  ansible.builtin.shell: >
      PATH=$PATH:/usr/pgsql-{{ postgresql_major_version }}/bin;
      {{ postgresql_name }}-check-db-dir {{ postgresql_pgdata }};
  register: pgdata_status
  changed_when: pgdata_status.rc != 0
  failed_when: False

- name: Check if manual intervention is necessary
  when:
    - pgdata_status is changed
    - "'version' in pgdata_status.stdout"
  ansible.builtin.fail:
    msg: "{{ pgdata_status.stdout }}"

- name: Initialize the database cluster
  when:
    - pgdata_status is changed
    - "'initdb' in pgdata_status.stdout"
  become: true
  environment:
    PGSETUP_INITDB_OPTIONS: >
        --no-locale
        -D '{{ postgresql_pgdata }}'
        -E UNICODE
  ansible.builtin.shell: >
      PATH=$PATH:/usr/pgsql-{{ postgresql_version }}/bin;
      {{ postgresql_name }}-setup initdb;
  notify:
   - Restart PostgreSQL

#
# PostgreSQL configuration
#
- name: PostgreSQL configuration
  with_items: "{{ postgresql_conf }}"
  become: true
  become_user: postgres
  ansible.builtin.lineinfile:
    dest: "{{ postgresql_pgdata }}/postgresql.conf"
    regexp: "^\\s*{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.val | default('') }}"
    insertafter: "^#+\\s*{{ item.key }}\\s*="
    state: "{{ item.state | default('present') }}"
  notify:
  - Restart PostgreSQL

- name: PostgreSQL host-based authentication directory
  become: true
  become_user: postgres
  ansible.builtin.file:
    path:  "{{ postgresql_pgdata }}/pg_hba.d"
    state: directory
    owner: postgres
    group: postgres
    mode:  '0755'

- name: PostgreSQL host-based authentication
  become: true
  become_user: postgres
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgresql_pgdata }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: 0600
  notify:
  - Reload PostgreSQL

# PostgreSQL 12+ replaced recovery.conf with standby.signal file and
# moved primary_conninfo into postgresql.conf.  Versions before 12 use
# the legacy recovery.conf file.

- name: Enable PostgreSQL recovery configuration (legacy)
  when:
  - postgresql_major_version | int < 12
  - postgresql_recovery | default({}) | length > 0
  become: true
  become_user: postgres
  ansible.builtin.template:
    src: "recovery.conf.j2"
    dest: "{{ postgresql_pgdata }}/recovery.conf"
    owner: postgres
    group: postgres
    mode: 0600
  notify:
  - Reload PostgreSQL

- name: Disable PostgreSQL recovery configuration (legacy)
  when:
  - postgresql_major_version | int < 12
  - postgresql_recovery | default({}) | length == 0
  become: true
  become_user: postgres
  ansible.builtin.file:
    path: "{{ postgresql_pgdata }}/recovery.conf"
    state: absent
  notify:
  - Reload PostgreSQL

- name: Enable standby signal file (PostgreSQL 12+)
  when:
  - postgresql_major_version | int >= 12
  - postgresql_recovery | default({}) | length > 0
  become: true
  become_user: postgres
  ansible.builtin.copy:
    content: ""
    dest: "{{ postgresql_pgdata }}/standby.signal"
    owner: postgres
    group: postgres
    mode: 0600
    force: false

- name: Configure primary_conninfo in postgresql.conf (PostgreSQL 12+)
  when:
  - postgresql_major_version | int >= 12
  - postgresql_recovery | default({}) | length > 0
  - postgresql_recovery.primary_conninfo is defined
  become: true
  become_user: postgres
  ansible.builtin.lineinfile:
    dest: "{{ postgresql_pgdata }}/postgresql.conf"
    regexp: "^\\s*primary_conninfo\\s*="
    line: "primary_conninfo = 'host={{ postgresql_recovery.primary_conninfo.host }} port={{ postgresql_recovery.primary_conninfo.port }} user={{ postgresql_recovery.primary_conninfo.user }} password={{ postgresql_recovery.primary_conninfo.password }}'"
    state: present
  notify:
  - Restart PostgreSQL

- name: Disable standby mode (PostgreSQL 12+)
  when:
  - postgresql_major_version | int >= 12
  - postgresql_recovery | default({}) | length == 0
  become: true
  become_user: postgres
  ansible.builtin.file:
    path: "{{ postgresql_pgdata }}/standby.signal"
    state: absent
  notify:
  - Restart PostgreSQL

- name: Remove primary_conninfo when not in standby (PostgreSQL 12+)
  when:
  - postgresql_major_version | int >= 12
  - postgresql_recovery | default({}) | length == 0
  become: true
  become_user: postgres
  ansible.builtin.lineinfile:
    dest: "{{ postgresql_pgdata }}/postgresql.conf"
    regexp: "^\\s*primary_conninfo\\s*="
    state: absent
  notify:
  - Restart PostgreSQL

- name: Remove legacy recovery.conf on PostgreSQL 12+
  when:
  - postgresql_major_version | int >= 12
  become: true
  become_user: postgres
  ansible.builtin.file:
    path: "{{ postgresql_pgdata }}/recovery.conf"
    state: absent

- name: Enable and start the PostgreSQL service
  become: true
  ansible.builtin.service:
    name: "{{ postgresql_name }}"
    enabled: true
    state: started

